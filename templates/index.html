<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080b14;
            --surface: #0e1320;
            --card: #141b2d;
            --border: #1e2a42;
            --border-thick: #2e4068;
            --text: #e4e8f4;
            --dim: #5a6a88;
            --accent: #3b9eff;
            --accent-glow: rgba(59, 158, 255, 0.35);
            --solve-color: #f0aa30;
            --solve-glow: rgba(240, 170, 48, 0.3);
            --given-color: #e4e8f4;
            --error: #ff5c6a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(59, 158, 255, 0.07) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(240, 170, 48, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--solve-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--dim);
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .board-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            width: 630px;
            height: 630px;
        }

        .cell {
            position: relative;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--given-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: background 0.2s, box-shadow 0.2s;
            caret-color: var(--accent);
        }

        .cell input:focus {
            background: rgba(59, 158, 255, 0.08);
            box-shadow: inset 0 0 0 2px var(--accent);
            z-index: 2;
            position: relative;
        }

        .cell input.given {
            color: var(--given-color);
            font-weight: 700;
        }

        .cell input.solved {
            color: var(--solve-color);
            font-weight: 400;
            animation: revealNum 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .cell input.solving-active {
            background: rgba(240, 170, 48, 0.1);
            box-shadow: 0 0 24px var(--solve-glow), inset 0 0 0 1px rgba(240, 170, 48, 0.3);
        }

        /* 3x3 block borders */
        .cell:nth-child(3n) input { border-right: 2px solid var(--border-thick); }
        .cell:nth-child(9n+1) input { border-left: 2px solid var(--border-thick); }
        .cell:nth-child(n+1):nth-child(-n+9) input { border-top: 2px solid var(--border-thick); }
        .cell:nth-child(n+73):nth-child(-n+81) input { border-bottom: 2px solid var(--border-thick); }

        .cell:nth-child(n+19):nth-child(-n+27) input { border-bottom: 2px solid var(--border-thick); }
        .cell:nth-child(n+46):nth-child(-n+54) input { border-bottom: 2px solid var(--border-thick); }
        .cell:nth-child(n+28):nth-child(-n+36) input { border-top: 2px solid var(--border-thick); }
        .cell:nth-child(n+55):nth-child(-n+63) input { border-top: 2px solid var(--border-thick); }

        @keyframes revealNum {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.15); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 8px var(--solve-glow); }
            50% { box-shadow: 0 0 24px var(--solve-glow), 0 0 48px rgba(240, 170, 48, 0.15); }
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            border-radius: 12px;
            padding: 16px 40px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-solve {
            background: linear-gradient(135deg, var(--accent), #5eb8ff);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-solve:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        .btn-solve:active { transform: translateY(0); }

        .btn-reset {
            background: var(--card);
            color: var(--dim);
            border: 1px solid var(--border);
        }
        .btn-reset:hover {
            color: var(--text);
            border-color: var(--border-thick);
            transform: translateY(-2px);
        }

        .btn-instant {
            background: linear-gradient(135deg, #a855f7, #c084fc);
            color: #fff;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
        }
        .btn-instant:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
        }
        .btn-instant:active { transform: translateY(0); }

        .btn-sample {
            background: transparent;
            color: var(--dim);
            border: 1px solid var(--border);
            padding: 16px 24px;
        }
        .btn-sample:hover {
            color: var(--solve-color);
            border-color: rgba(240, 170, 48, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--dim);
            height: 20px;
            transition: all 0.3s;
        }
        .status.active { color: var(--solve-color); }
        .status.error { color: var(--error); }

        .cell input.conflict {
            background: rgba(255, 92, 106, 0.15);
            box-shadow: inset 0 0 0 2px var(--error);
            color: var(--error);
            z-index: 2;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SUDOKU SOLVER</h1>
            <p>Backtracking Algorithm Visualizer</p>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <button class="btn btn-solve" id="solveBtn" onclick="solvePuzzle(false)">Solve</button>
            <button class="btn btn-instant" id="instantBtn" onclick="solvePuzzle(true)">Instant</button>
            <button class="btn btn-reset" id="resetBtn" onclick="resetBoard()">Reset</button>
            <button class="btn btn-sample" onclick="loadSample()">Sample</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const SAMPLE = [
            [5,3,0,0,7,0,0,0,0],
            [6,0,0,1,9,5,0,0,0],
            [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3],
            [4,0,0,8,0,3,0,0,1],
            [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0],
            [0,0,0,4,1,9,0,0,5],
            [0,0,0,0,8,0,0,7,9]
        ];

        let solving = false;

        function buildBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    input.id = `c-${i}-${j}`;
                    input.setAttribute('data-r', i);
                    input.setAttribute('data-c', j);
                    input.addEventListener('input', handleInput);
                    input.addEventListener('keydown', handleNav);
                    cell.appendChild(input);
                    board.appendChild(cell);
                }
            }
        }

        function handleInput(e) {
            const val = e.target.value;
            if (!/^[1-9]$/.test(val)) {
                e.target.value = '';
                e.target.classList.remove('given', 'conflict');
                revalidateAll();
                return;
            }
            e.target.classList.add('given');
            revalidateAll();
        }

        function getConflicts() {
            const vals = {};
            const conflicts = new Set();
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const v = document.getElementById(`c-${i}-${j}`).value;
                    if (!v) continue;
                    const box = `${Math.floor(i/3)}-${Math.floor(j/3)}`;
                    const keys = [`r${i}-${v}`, `c${j}-${v}`, `b${box}-${v}`];
                    for (const k of keys) {
                        if (vals[k]) {
                            conflicts.add(vals[k]);
                            conflicts.add(`${i}-${j}`);
                        } else {
                            vals[k] = `${i}-${j}`;
                        }
                    }
                }
            }
            return conflicts;
        }

        function revalidateAll() {
            const conflicts = getConflicts();
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const el = document.getElementById(`c-${i}-${j}`);
                    if (conflicts.has(`${i}-${j}`)) {
                        el.classList.add('conflict');
                    } else {
                        el.classList.remove('conflict');
                    }
                }
            }
        }

        function handleNav(e) {
            const r = parseInt(e.target.dataset.r);
            const c = parseInt(e.target.dataset.c);
            let nr = r, nc = c;
            if (e.key === 'ArrowUp') nr = Math.max(0, r - 1);
            else if (e.key === 'ArrowDown') nr = Math.min(8, r + 1);
            else if (e.key === 'ArrowLeft') nc = Math.max(0, c - 1);
            else if (e.key === 'ArrowRight') nc = Math.min(8, c + 1);
            else if (e.key === 'Backspace' || e.key === 'Delete') {
                e.target.value = '';
                e.target.classList.remove('given', 'solved', 'solving-active');
                return;
            } else return;
            if (nr !== r || nc !== c) {
                e.preventDefault();
                document.getElementById(`c-${nr}-${nc}`).focus();
            }
        }

        function getGrid() {
            const grid = [];
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const el = document.getElementById(`c-${i}-${j}`);
                    const v = parseInt(el.value) || 0;
                    if (v) grid.push({r: i, c: j, v: v});
                }
            }
            return grid;
        }

        function setStatus(msg, cls) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status ' + (cls || '');
        }

        async function solvePuzzle(instant = false) {
            if (solving) return;
            solving = true;
            document.getElementById('solveBtn').disabled = true;
            document.getElementById('instantBtn').disabled = true;
            setStatus('Solving...', 'active');

            document.querySelectorAll('.solved, .solving-active').forEach(el => {
                el.classList.remove('solved', 'solving-active');
            });

            if (getConflicts().size > 0) {
                setStatus('Fix conflicts before solving', 'error');
                solving = false;
                document.getElementById('solveBtn').disabled = false;
                return;
            }

            const grid = getGrid();
            try {
                const res = await fetch('/solve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({grid: grid})
                });
                const data = await res.json();

                if (data.success && data.solved.length > 0) {
                    if (instant) {
                        for (const {r, c, v} of data.solved) {
                            const el = document.getElementById(`c-${r}-${c}`);
                            el.value = v;
                            el.classList.add('solved');
                        }
                    } else {
                        await animateSolution(data.solved);
                    }
                    setStatus(`Solved — ${data.solved.length} cells filled`, 'active');
                } else {
                    setStatus('No solution found — check your input', 'error');
                }
            } catch (e) {
                setStatus('Error connecting to server', 'error');
            }
            solving = false;
            document.getElementById('solveBtn').disabled = false;
            document.getElementById('instantBtn').disabled = false;
        }

        async function animateSolution(solved) {
            const batchSize = 4;
            for (let i = 0; i < solved.length; i += batchSize) {
                const batch = solved.slice(i, i + batchSize);
                for (const {r, c, v} of batch) {
                    const el = document.getElementById(`c-${r}-${c}`);
                    el.value = v;
                    el.classList.add('solved', 'solving-active');
                }
                await sleep(1);
                for (const {r, c} of batch) {
                    document.getElementById(`c-${r}-${c}`).classList.remove('solving-active');
                }
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function resetBoard() {
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    const el = document.getElementById(`c-${i}-${j}`);
                    el.value = '';
                    el.classList.remove('given', 'solved', 'solving-active', 'conflict');
                }
            }
            setStatus('');
        }

        function loadSample() {
            resetBoard();
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (SAMPLE[i][j] !== 0) {
                        const el = document.getElementById(`c-${i}-${j}`);
                        el.value = SAMPLE[i][j];
                        el.classList.add('given');
                    }
                }
            }
            setStatus('Sample puzzle loaded');
        }

        buildBoard();
    </script>
</body>
</html>
